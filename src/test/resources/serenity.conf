webdriver {
  # Define el navegador por defecto
  driver = chrome
  autodownload = true # Habilita explícitamente Selenium Manager

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "start-maximized",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "no-sandbox"
      ]
    }
  }
}

# Configuraciones adicionales de Serenity para un reporte más limpio
serenity {
  take.screenshots = FOR_FAILURES # Opciones: BEFORE_AND_AFTER_EACH_STEP, AFTER_EACH_STEP, FOR_FAILURES
  test.root = "org.btg.practual"
  logging = VERBOSE
}