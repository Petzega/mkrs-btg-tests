webdriver {
  # Define el navegador por defecto
  driver = chrome
  autodownload = true # Habilita explícitamente Selenium Manager

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "start-maximized",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "no-sandbox"
      ]
    }
  }
}

# Configuraciones adicionales de Serenity para un reporte más limpio
serenity {
    take.screenshots = FOR_FAILURES
    test.root = "org.btg.practual"
    logging = QUIET
    console.colors = true
}

# Gestión de ambientes
environments {
  qa {
    webdriver.base.url = "https://qa.btgpactual.com"
    api.endpoint = "https://api-qa.btgpactual.com/v1"
  }
  stg {
    webdriver.base.url = "https://stg.btgpactual.com"
    api.endpoint = "https://api-stg.btgpactual.com/v1"
  }
}